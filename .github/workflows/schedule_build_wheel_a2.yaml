name: Build and Publish Wheel A2

on:
  workflow_run:
    workflows: ["Sync Upstream Main"]
    types: [completed]
    branches: [main]
  schedule:
    # Run at 9:30 Beijing time (UTC+8), after upstream sync
    - cron: '30 1 * * *'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch, tag, or SHA)'
        required: false
        default: main
        type: string

permissions:
  contents: write

concurrency:
  group: build-wheel-a2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheel:
    name: build wheel (A2)
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04-arm
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      commit_sha: ${{ steps.meta.outputs.commit_sha }}
    steps:
      - name: Checkout vllm-ascend
        uses: actions/checkout@v7
        with:
          submodules: recursive
          ref: >-
            ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha
            || github.event_name == 'workflow_dispatch' && github.event.inputs.ref
            || 'main' }}

      - name: Prepare release metadata
        id: meta
        run: |
          COMMIT_SHA="$(git rev-parse HEAD)"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +%Y%m%d)"
          echo "commit_sha=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"
          echo "release_tag=wheel-a2-${BUILD_DATE}-${SHORT_SHA}-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "release_name=vllm-ascend A2 wheel (ARM, py3.12) ${BUILD_DATE}" >> "$GITHUB_OUTPUT"

      - name: Free up disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          docker-images: false

      - name: Build wheel
        run: |
          docker build -f ./.github/workflows/dockerfiles/Dockerfile.buildwheel.a2 \
            --build-arg PY_VERSION=3.12 \
            -t wheel-a2:v1 .
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -v "$(pwd):/outpwd" \
            wheel-a2:v1 \
            bash -c "cp -r /workspace/vllm-ascend/dist /outpwd"
          ls dist

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Repair wheels with auditwheel
        run: |
          python3 -m pip install auditwheel patchelf
          python3 .github/workflows/scripts/wheel/auto_exclude.py dist
          ls dist

      - name: Verify automatic platform tags
        run: |
          cd dist
          for wheel in *.whl; do
            echo "verification file: $wheel"
            auditwheel show "$wheel"
          done

      - name: Generate variant wheels
        env:
          WHEEL_FILE: dist
          PROJECT_TOML: .github/workflows/scripts/wheel/pyproject.toml
          OUTPUT_DIR: dist/variants
        run: |
          pip install build git+https://github.com/wheelnext/variantlib.git --quiet
          mkdir -p dist/variants
          python3 .github/workflows/scripts/wheel/make_variant.py \
            -c .github/workflows/scripts/wheel/config.json \
            -l 910b
          echo "Generated variant wheels:"
          ls dist/variants/

      - name: Archive wheel
        uses: actions/upload-artifact@v7
        with:
          name: vllm-ascend-a2-arm-py3.12-wheel
          path: dist/

  publish_github_release:
    name: publish GitHub release
    needs: [build_wheel]
    runs-on: ubuntu-24.04
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v8
        with:
          name: vllm-ascend-a2-arm-py3.12-wheel
          path: dist/

      - name: Generate variant index
        run: |
          pip install git+https://github.com/wheelnext/variantlib.git --quiet
          variantlib generate-index-json -d dist/variants/
          ls dist/variants/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build_wheel.outputs.release_tag }}
          name: ${{ needs.build_wheel.outputs.release_name }}
          target_commitish: ${{ needs.build_wheel.outputs.commit_sha }}
          prerelease: true
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/variants/*.whl
            dist/variants/*.json
