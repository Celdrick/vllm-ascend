name: Sync Upstream Main

on:
  schedule:
    # Run at 9:00 Beijing time (UTC+8)
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: true

env:
  UPSTREAM_REPO: vllm-project/vllm-ascend
  UPSTREAM_BRANCH: main

jobs:
  sync:
    name: Sync from upstream main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Merge upstream main
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git" || \
            git remote set-url upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream "${UPSTREAM_BRANCH}"

          BEFORE_SHA="$(git rev-parse HEAD)"
          UPSTREAM_SHA="$(git rev-parse "upstream/${UPSTREAM_BRANCH}")"

          if [ "${BEFORE_SHA}" = "${UPSTREAM_SHA}" ]; then
            echo "Already up to date with upstream/${UPSTREAM_BRANCH} (${UPSTREAM_SHA})"
            exit 0
          fi

          # Snapshot fork workflows before merge; restored verbatim after merge.
          git archive "${BEFORE_SHA}" -o /tmp/fork-workflows.tar .github/workflows

          restore_fork_workflows() {
            rm -rf .github/workflows
            tar -xf /tmp/fork-workflows.tar
            git add -A .github/workflows/
          }

          # Merge without committing first so the pushed commit never touches
          # .github/workflows/ (GITHUB_TOKEN cannot push workflow file changes).
          if ! git merge --no-commit --no-ff "upstream/${UPSTREAM_BRANCH}"; then
            restore_fork_workflows
            REMAINING_CONFLICTS="$(git diff --name-only --diff-filter=U | grep -v '^\.github/workflows/' || true)"
            if [ -n "${REMAINING_CONFLICTS}" ]; then
              echo "::error::Merge conflicts outside .github/workflows/:"
              echo "${REMAINING_CONFLICTS}"
              git merge --abort
              exit 1
            fi
          else
            restore_fork_workflows
          fi

          if git diff --cached --quiet && git diff --quiet; then
            git merge --abort 2>/dev/null || true
            echo "No net changes after keeping fork workflows"
            exit 0
          fi

          if git diff --cached "${BEFORE_SHA}" -- .github/workflows/ | grep -q .; then
            echo "::error::Workflow tree still differs from fork after restore:"
            git diff --cached "${BEFORE_SHA}" -- .github/workflows/ || true
            git merge --abort 2>/dev/null || true
            exit 1
          fi
          echo "Workflow tree matches fork before sync"

          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "::error::Unresolved merge conflicts remain:"
            git diff --name-only --diff-filter=U
            git merge --abort 2>/dev/null || true
            exit 1
          fi

          git commit -m "Merge upstream/${UPSTREAM_BRANCH} (keep fork workflows)"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" main

          echo "Synced ${BEFORE_SHA} -> ${UPSTREAM_SHA} (workflows unchanged)"
